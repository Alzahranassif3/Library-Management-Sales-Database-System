<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Confirm Delete</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f7fb;
      margin:0;
      padding:40px;
    }

    h2{
      margin-bottom:8px;
    }

    .warning{
      color:#c0392b;
      font-size:14px;
      margin-bottom:15px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      max-width:500px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-bottom:15px;
      font-size:14px;
    }

    th, td{
      padding:8px;
      border-bottom:1px solid #ddd;
      text-align:left;
    }

    th{
      background:#f0f2f7;
      width:35%;
    }

    .actions{
      margin-top:15px;
    }

    button{
      background:#c0392b;
      color:white;
      border:none;
      padding:8px 14px;
      border-radius:6px;
      cursor:pointer;
      font-size:14px;
    }

    a{
      margin-left:10px;
      font-size:14px;
      color:#333;
      text-decoration:none;
    }

    a:hover{
      text-decoration:underline;
    }

    button:hover{
      background:#a93226;
    }
  </style>
</head>

<body>

  <h2>Confirm Delete</h2>
  <p class="warning">Are you sure you want to delete this customer?</p>

  <div class="card">

    <table>
      <tr><th>ID</th><td>{{ customer.customer_id }}</td></tr>
      <tr><th>First Name</th><td>{{ customer.first_name }}</td></tr>
      <tr><th>Last Name</th><td>{{ customer.last_name }}</td></tr>
      <tr><th>Email</th><td>{{ customer.email }}</td></tr>
      <tr><th>Phone</th><td>{{ customer.phone }}</td></tr>
    </table>

    <form method="POST" action="/customers/delete/confirm">
      <input type="hidden" name="customer_id" value="{{ customer.customer_id }}">

      <div class="actions">
        <button type="submit">Confirm Delete</button>
        <a href="/customers/delete">Cancel</a>
        <a href="/">Home</a>
      </div>
    </form>

  </div>

</body>
</html>
