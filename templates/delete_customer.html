<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Delete Customer</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f7fb;
      margin:0;
      padding:40px;
    }

    h2{
      margin-bottom:10px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      max-width:420px;
    }

    label{
      display:block;
      margin-bottom:6px;
      font-size:14px;
    }

    input{
      width:100%;
      padding:8px;
      border:1px solid #ccc;
      border-radius:5px;
      font-size:14px;
    }

    .actions{
      margin-top:15px;
    }

    button{
      background:#c0392b;
      color:white;
      border:none;
      padding:8px 14px;
      border-radius:6px;
      cursor:pointer;
      font-size:14px;
    }

    a{
      margin-left:10px;
      font-size:14px;
      color:#333;
      text-decoration:none;
    }

    a:hover{
      text-decoration:underline;
    }

    .error{
      color:red;
      margin-top:10px;
      font-size:14px;
    }
  </style>
</head>

<body>

  <h2>Delete Customer</h2>

  <div class="card">
    <form method="POST">

      <label>
        Enter Customer ID
        <input name="customer_id" type="number" min="1" required>
      </label>

      <div class="actions">
        <button type="submit">Search</button>
        <a href="/">Back to Home</a>
      </div>

    </form>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
  </div>

</body>
</html>
