<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Checkout</title>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--border:#e5e7eb;--primary:#2563eb;--primary2:#1d4ed8;}
    *{box-sizing:border-box;font-family:Arial,sans-serif}
    body{margin:0;background:var(--bg);color:var(--text)}
    .wrap{max-width:800px;margin:30px auto;padding:0 16px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    h1{margin:0;font-size:20px}
    p{margin:6px 0 0;color:var(--muted);font-size:13px}
    label{display:block;margin-top:12px;font-weight:700;font-size:13px}
    select,input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;margin-top:6px}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .btn{display:inline-block;padding:10px 12px;border-radius:10px;text-decoration:none;color:#fff;background:var(--primary);font-weight:600;font-size:13px;border:none;cursor:pointer}
    .btn:hover{background:var(--primary2)}
    .btn-outline{background:#fff;color:var(--primary);border:1px solid var(--primary)}
    .btn-outline:hover{background:#eff6ff}
    .total{margin-top:12px;font-weight:800;font-size:16px}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Checkout</h1>
    <p>Confirm payment details and create the bill.</p>

    <div class="total">Order #{{ order_id }} — Total: {{ total }}</div>

    <form method="post" action="/sales/checkout/confirm">
      <label>Bill Date</label>
      <input type="date" name="bill_date" required>

      <label>Payment Method</label>
      <select name="payment_method" required>
        <option value="" disabled selected>Select</option>
        <option value="Cash">Cash</option>
        <option value="Card">Card</option>
        <option value="Bank Transfer">Bank Transfer</option>
      </select>

      <label>Payment Status</label>
      <select name="payment_status" required>
        <option value="" disabled selected>Select</option>
        <option value="Paid">Paid</option>
        <option value="Unpaid">Unpaid</option>
      </select>

      <div class="row">
        <a class="btn btn-outline" href="/sales/items">Back</a>
        <button class="btn" type="submit">Create Bill</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
