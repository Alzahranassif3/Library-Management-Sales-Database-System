<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Add Customer</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f7fb;
      margin:0;
      padding:40px;
    }

    h2{
      margin-bottom:5px;
    }

    p.desc{
      color:#555;
      margin-top:0;
      margin-bottom:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      max-width:500px;
    }

    label{
      display:block;
      margin-top:12px;
      font-size:14px;
    }

    input{
      width:100%;
      padding:8px;
      margin-top:4px;
      border:1px solid #ccc;
      border-radius:5px;
      font-size:14px;
    }

    .actions{
      margin-top:20px;
    }

    button{
      background:#2f67ff;
      color:white;
      border:none;
      padding:8px 16px;
      border-radius:6px;
      cursor:pointer;
      font-size:14px;
    }

    a{
      margin-left:10px;
      color:#333;
      text-decoration:none;
      font-size:14px;
    }

    button:hover{
      background:#244fd1;
    }
  </style>
</head>

<body>

  <h2>Add Customer</h2>
  <p class="desc">Enter customer information</p>

  <div class="card">
    <form method="POST">

      <label>
        First Name
        <input name="first_name" required>
      </label>

      <label>
        Last Name
        <input name="last_name" required>
      </label>

      <label>
        Email
        <input name="email" type="email" required>
      </label>

      <label>
        Phone
        <input name="phone" required>
      </label>

      <div class="actions">
        <button type="submit">Save</button>
        <a href="/">Cancel</a>
      </div>

    </form>
  </div>

</body>
</html>
