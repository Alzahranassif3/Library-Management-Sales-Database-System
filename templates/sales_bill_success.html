<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Bill Created</title>

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --primary:#2563eb;
      --primary2:#1d4ed8;
      --success:#16a34a;
    }
    *{box-sizing:border-box;font-family:Arial,sans-serif}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width:700px;
      margin:60px auto;
      padding:0 16px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:24px;
      box-shadow:0 1px 2px rgba(0,0,0,.04);
      text-align:center;
    }
    .icon{
      font-size:42px;
      color:var(--success);
      margin-bottom:10px;
    }
    h1{
      margin:0;
      font-size:22px;
    }
    .info{
      margin-top:16px;
      text-align:left;
      font-size:14px;
    }
    .info div{
      margin-bottom:8px;
    }
    .label{
      color:var(--muted);
      font-weight:700;
      margin-right:6px;
    }
    .total{
      margin-top:16px;
      font-size:18px;
      font-weight:800;
    }
    .btn-row{
      display:flex;
      justify-content:center;
      gap:12px;
      margin-top:22px;
      flex-wrap:wrap;
    }
    .btn{
      display:inline-block;
      padding:10px 16px;
      border-radius:10px;
      text-decoration:none;
      font-weight:600;
      font-size:14px;
      background:var(--primary);
      color:#fff;
    }
    .btn:hover{background:var(--primary2);}
    .btn-outline{
      background:#fff;
      color:var(--primary);
      border:1px solid var(--primary);
    }
    .btn-outline:hover{
      background:#eff6ff;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="icon">✔</div>

      <h1>Bill Created Successfully</h1>

      <div class="info">
        <div>
          <span class="label">Bill ID:</span> {{ bill_id }}
        </div>
        <div>
          <span class="label">Order ID:</span> {{ order_id }}
        </div>
      </div>

      <div class="total">
        Total Amount: {{ total }}
      </div>

      <div class="btn-row">
        <a href="/" class="btn btn-outline">Back to Home</a>
        <a href="/sales/new" class="btn">New Sale</a>
      </div>
    </div>
  </div>
</body>
</html>
