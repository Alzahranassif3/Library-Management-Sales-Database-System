<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Purchase Details</title>

  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --primary:#2563eb;
      --primary2:#1d4ed8;
    }

    *{
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
    }

    .layout{
      display:flex;
      min-height:100vh;
    }

    .sidebar{
      width:260px;
      background:#111827;
      color:#fff;
      padding:18px;
    }

    .brand{
      font-size:18px;
      font-weight:700;
      margin-bottom:18px;
    }

    .nav a{
      display:block;
      padding:10px 12px;
      border-radius:10px;
      color:#e5e7eb;
      text-decoration:none;
      margin-bottom:6px;
    }

    .nav a:hover,
    .nav a.active{
      background:#1f2937;
      color:#fff;
    }

    .content{
      flex:1;
      padding:22px;
    }

    .header h1{
      margin:0;
      font-size:22px;
    }

    .header p{
      margin:4px 0 18px;
      color:var(--muted);
      font-size:13px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:16px;
      margin-bottom:16px;
      box-shadow:0 1px 2px rgba(0,0,0,.04);
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th, td{
      padding:10px;
      border-bottom:1px solid var(--border);
      text-align:left;
      font-size:13px;
    }

    th{
      background:#f1f5f9;
      font-weight:700;
    }

    .btn-row{
      margin-top:16px;
    }

    .btn{
      display:inline-block;
      padding:10px 14px;
      border-radius:10px;
      background:var(--primary);
      color:#fff;
      text-decoration:none;
      font-size:13px;
      font-weight:600;
      margin-right:8px;
    }

    .btn:hover{
      background:var(--primary2);
    }

    .btn-outline{
      background:#fff;
      color:var(--primary);
      border:1px solid var(--primary);
    }

    .btn-outline:hover{
      background:#eff6ff;
    }
  </style>
</head>

<body>
<div class="layout">

  <aside class="sidebar">
    <div class="brand">Al-Sarisi Library</div>
    <div class="sub">Owner Dashboard</div>
    

    <nav class="nav">
      <a class="active" href="/">Dashboard</a>
      <a href="/customers">Customers</a>
      <a href="/products">Products</a>
      <a href="/sales/new">Sales</a>
       <a href="/purchases">Purchases List</a>
      <a href="/purchases/new">New Purchase</a>
      <a href="/inventory">Inventory</a>
      <a href="/movements">Stock Movements</a>
      <a href="/reports">Reports</a>
    </nav>
  </aside>

  <main class="content">
    <div class="header">
      <h1>Purchase #{{ purchase.purchase_id }}<_
